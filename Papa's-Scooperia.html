<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-L7856P3VNT"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-L7856P3VNT');
</script>

<script src="https://cdn.jsdelivr.net/gh/u-cvlassrom-y/google@main/ruffle.js"></script>

<style>

html, body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

.game-wrapper{
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.game-container{
aspect-ratio: 4 / 3;
width:100%;
height:100%;
max-width:100vw;
max-height:100vh;
}

.game-container object,
.game-container embed{
width:100%;
height:100%;
display:block;
}

/* Sidebar Ads */

#sidebarad1,
#sidebarad2{
position:fixed;
top:50%;
transform:translateY(-50%);
width:160px;
height:300px;
z-index:9999;
}

#sidebarad1{left:0;}
#sidebarad2{right:0;}

.sidebar-close{
position:absolute;
top:0;
right:0;
width:22px;
height:22px;
line-height:22px;
text-align:center;
background:rgba(0,0,0,0.7);
color:#fff;
cursor:pointer;
}

</style>
</head>

<body>

<div class="game-wrapper">

<div class="game-container">

<object>
<param name="movie" value="https://cdn.jsdelivr.net/gh/Bescr01/swf@e2ab9deab96c02aaa67e56334d34ccea3bbb8a3e/Papa's%20Scooperia.swf">

<embed src="https://cdn.jsdelivr.net/gh/Bescr01/swf@e2ab9deab96c02aaa67e56334d34ccea3bbb8a3e/Papa's%20Scooperia.swf">

</object>

</div>

</div>

<div id="sidebarad1">
<div class="sidebar-close" onclick="this.parentElement.style.display='none'">✕</div>
</div>

<div id="sidebarad2">
<div class="sidebar-close" onclick="this.parentElement.style.display='none'">✕</div>
</div>

</body>
</html>
